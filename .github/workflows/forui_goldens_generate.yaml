name: Forui Goldens Generate

on:
  # Auto-triggers disabled while goldens are paused in CI (see flutter/flutter#184182).
  # Re-enable by uncommenting the pull_request block.
  workflow_dispatch: {}
  # pull_request:
  #   branches: [ main ]
  #   paths:
  #     - '.github/workflows/forui_presubmit*.yaml'
  #     - 'forui/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  generate-goldens:
    name: Generate goldens
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: forui
    strategy:
      matrix:
        os: [ macos-latest, windows-latest ]
        flutter-version: [ 3.x ]

    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2.23.0
      - run: flutter pub get
      - run: dart run build_runner build
      - run: flutter test --update-goldens

      - id: changes
        working-directory: .
        shell: bash
        run: |
          git add -- forui/test
          git diff --cached --exit-code -- forui/test && echo "changes=false" >> $GITHUB_OUTPUT || {
            git diff --cached --binary --full-index -- forui/test > changes-${{ matrix.os }}.patch
            echo "changes=true" >> $GITHUB_OUTPUT
          }

      - if: steps.changes.outputs.changes == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: golden-changes-${{ matrix.os }}
          path: changes-${{ matrix.os }}.patch
          retention-days: 1
